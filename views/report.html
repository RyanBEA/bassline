<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BASELINE — Your Energy Baseline Report</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="report">
    <div class="report-container">
      <img src="/images/bea-logo-white.png" alt="Baseline Energy Analytics" class="report-logo">
      <h1 class="report-title">Your Bass Line</h1>

      <div class="report-video">
        <iframe
          id="video-player"
          src="https://www.youtube.com/embed/{{VIDEO_ID}}?autoplay=1&rel=0"
          title="Your Energy Baseline"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
        ></iframe>
      </div>

      <p class="report-subtitle">Analysis complete. Here is your building's unique bass line.</p>

      <a href="/" class="cta-button report-cta">Run Another Assessment</a>
    </div>
  </main>
</body>
</html>
